name: "CodeQL"

on:
  push:
    branches: ["main"]
  # pull_request: analysis jobs run on this trigger when the branch protection requires
  # a workflow-authored CodeQL check. On bot-authored PRs this is blocked by the
  # action_required policy; the native dynamic CodeQL setup handles the actual scans.
  pull_request:
    branches: ["main"]
  # pull_request_target: runs in the base-branch context without checking out PR code.
  # It is NOT subject to the action_required approval gate for bot-authored PRs, so
  # the CodeQL summary job below can always post a result for the branch protection rule.
  pull_request_target:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Skip on pull_request_target: PR code must not run in base-branch context (security).
    # The native dynamic CodeQL setup handles analysis for pull_request_target events.
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  analyze-rust:
    name: Analyze (rust)
    # Skip on pull_request_target for the same reason as the analyze job above.
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  # Required by the branch protection rule as the "CodeQL" status check.
  # On push/pull_request/schedule it runs after all analyses succeed (eliminates the
  # race condition where the native gate fires before analyses are uploaded).
  # On pull_request_target it runs immediately without analysis (bypasses the
  # action_required approval gate for bot-authored PRs) and passes, because the
  # native dynamic CodeQL setup has already run the real analysis scans.
  CodeQL:
    name: CodeQL
    needs: [analyze, analyze-rust]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions: {}
    steps:
      - name: Check analysis results
        run: |
          analyze_result="${{ needs.analyze.result }}"
          rust_result="${{ needs.analyze-rust.result }}"
          event_name="${{ github.event_name }}"
          # On pull_request_target, analysis jobs are intentionally skipped (security:
          # PR code must not run in the base-branch context). The native dynamic CodeQL
          # setup handles the real scans for this event type, so the gate passes here.
          if [[ "$event_name" == "pull_request_target" ]]; then
            echo "Event is pull_request_target; analysis jobs are skipped by design."
            echo "Native dynamic CodeQL setup runs the real scans for this event type."
            exit 0
          fi
          # For all other events (push, pull_request, schedule) the analysis jobs must
          # have succeeded. Skipped results here indicate a misconfiguration.
          if [[ "$analyze_result" != "success" || "$rust_result" != "success" ]]; then
            echo "One or more CodeQL analyses failed, were cancelled, or were skipped."
            echo "analyze: $analyze_result"
            echo "analyze-rust: $rust_result"
            exit 1
          fi
          echo "All CodeQL analyses passed."
