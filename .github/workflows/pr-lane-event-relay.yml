name: PR Lane Event Relay

on:
  push:
    branches: ['copilot/**']
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed, edited]
  check_suite:
    types: [completed]
  # pull_request_target runs in the base-branch context and is NOT subject to
  # the action_required approval gate for bot-authored PRs (e.g. Copilot). The
  # workflow uses no code from the PR, so no checkout is needed. Once this file
  # lands on main, it is immediately active for all open PRs targeting main.
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, labeled, unlabeled]
  # workflow_dispatch allows a maintainer to manually trigger this relay from the
  # Actions UI on any branch, bypassing the action_required org-policy gate.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  relay:
    runs-on: ubuntu-latest
    # For pull_request_target: only run for trusted bot actors to prevent misuse.
    # Regular contributors use the pull_request trigger.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.user.login == 'github-copilot[bot]' ||
      github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Skip when relay secret is missing
        id: preflight
        run: |
          if [ -z "${{ secrets.PLURES_PROJECTS }}" ]; then
            echo "Relay disabled: missing PLURES_PROJECTS secret"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch lane tick to automation-infrastructure
        if: steps.preflight.outputs.enabled == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLURES_PROJECTS }}
          repository: plures/automation-infrastructure
          event-type: lane-tick
          client-payload: |
            {
              "repo": "${{ github.event.repository.name }}",
              "event": "${{ github.event_name }}",
              "action": "${{ github.event.action || '' }}",
              "pr": "${{ github.event.pull_request.number || '' }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}"
            }
