name: Praxis History Tests

on:
  push:
    branches: [main, develop, 'copilot/**']
    paths:
      - 'src/praxis/**'
      - 'src/testing/**'
      - 'src/debugging/**'
      - 'tests/praxis/**'
      - 'vitest.config.ts'
      - '.github/workflows/test-praxis.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/praxis/**'
      - 'src/testing/**'
      - 'src/debugging/**'
      - 'tests/praxis/**'
      - 'vitest.config.ts'
  # pull_request_target runs in the base-branch context and is NOT subject to
  # the action_required approval gate for bot-authored PRs (e.g. Copilot). The
  # checkout step below explicitly checks out the PR head SHA so the PR's own
  # code is tested. This file already exists on main, so this trigger is active
  # immediately for all open PRs targeting main.
  pull_request_target:
    branches: [main]
    paths:
      - 'src/praxis/**'
      - 'src/testing/**'
      - 'src/debugging/**'
      - 'tests/praxis/**'
      - 'vitest.config.ts'
  # workflow_dispatch allows a maintainer to manually trigger this check from the
  # Actions UI on any branch, bypassing the action_required org-policy gate.
  workflow_dispatch:

jobs:
  test-praxis:
    runs-on: ubuntu-latest
    # Minimal read-only permissions so PR code running under pull_request_target
    # cannot use write-scoped tokens.
    permissions:
      contents: read
    # For pull_request_target: only run for trusted bot actors (e.g. the Copilot
    # bot) to prevent cache-poisoning from untrusted code running in the
    # base-branch context. Regular contributors use the pull_request trigger.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.user.login == 'github-copilot[bot]' ||
      github.event.pull_request.user.login == 'dependabot[bot]'

    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
        with:
          # On pull_request_target, github.sha is the base-branch HEAD, not the
          # PR head. Explicitly checkout the PR head SHA so the PR's code is tested.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run Praxis tests
        run: npm run test:praxis
      
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test-artifacts/
          retention-days: 7
      
      - name: Upload test coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: praxis-tests
          name: praxis-coverage

