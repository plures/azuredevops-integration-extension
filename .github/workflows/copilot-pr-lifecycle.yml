name: Copilot PR Lifecycle

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, closed]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  issues:
    types: [opened, labeled]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  lifecycle:
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: plures/repo-template/.github/workflows/copilot-pr-lifecycle-reusable.yml@main
    secrets:
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
