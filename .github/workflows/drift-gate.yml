name: Praxis Derive Drift Gate

# Ensures that derived artifacts (generated/) are always in sync with the
# Praxis schema (src/praxis/application/schema/descriptor.ts).
#
# Contribution policy: never edit files under generated/ by hand.
# Run `npm run derive` and commit the regenerated output instead.

on:
  push:
    branches: [main]
    paths:
      - 'src/praxis/**'
      - 'scripts/derive.ts'
      - 'src/praxis/application/schema/descriptor.ts'
      - 'generated/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/praxis/**'
      - 'scripts/derive.ts'
      - 'src/praxis/application/schema/descriptor.ts'
      - 'generated/**'

permissions:
  contents: read

jobs:
  drift-gate:
    name: Derive & drift check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate derived artifacts
        run: npm run derive:check

      - name: Confirm no uncommitted drift
        # derive:check already exits 1 if any artifact changed; this step is an
        # extra safety net that uses git to surface any file not covered by the
        # manifest hash comparison.
        run: |
          if ! git diff --quiet -- generated/; then
            echo "❌ Drift detected in generated/:"
            git diff --name-only -- generated/
            echo ""
            echo "Run 'npm run derive' locally and commit the updated files."
            exit 1
          fi
          echo "✅ All derived artifacts are up-to-date."

  scaffold-tests:
    name: Schema scaffold tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: drift-gate

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scaffold tests
        run: npm run test:derive
