version: 2
updates:
  # npm across all workspace manifests (root, mcp-server, apps, packages, vscode-stub)
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/mcp-server"
      - "/apps/app-desktop"
      - "/packages/core"
      - "/packages/ui-web"
      - "/vscode-stub"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Rust (Tauri desktop app)
  - package-ecosystem: "cargo"
    directory: "/apps/app-desktop/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
